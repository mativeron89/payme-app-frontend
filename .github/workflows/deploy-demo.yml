# Publica DOS builds del front en GitHub Pages en cada push a main:
#   /              → demo MOCK (para feedback de diseño, sin backend)
#   /live/         → real, contra el backend vivo de Railway (para el video YC)
# La URL queda en https://mativeron89.github.io/payme-app-frontend/
#                  y https://mativeron89.github.io/payme-app-frontend/live/
# Requiere una vez: Settings → Pages → Source: "GitHub Actions".
#
# El build /live/ apunta al backend real (VITE_MOCK=0). La publishable key de
# Stripe la sirve el backend en GET /api/config, así que NO va como variable acá.
# VITE_RESTAURANT_ID es el uuid del restaurante demo, usado como FALLBACK
# cuando la URL no trae el QR (?r=uuid). Nombre/dirección se resuelven en vivo
# contra GET /api/restaurants/:id (G-01 resuelto en backend v2.21).
name: Deploy demo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # 1) Build MOCK primero (a dist/ raíz).
      - run: npm run build -- --base=/payme-app-frontend/
        env:
          VITE_MOCK: '1'

      # 2) Build REAL a dist/live/ (no toca los archivos de dist/ raíz).
      - run: npm run build -- --base=/payme-app-frontend/live/ --outDir dist/live
        env:
          VITE_MOCK: '0'
          VITE_API_URL: https://payme-app-backend-production.up.railway.app
          # La Parolaccia en el backend vivo — fallback sin QR. El nombre ya
          # NO se hardcodea: lo resuelve GET /api/restaurants/:id (G-01, v2.21).
          VITE_RESTAURANT_ID: 00000000-0000-4000-8000-000000000001

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
